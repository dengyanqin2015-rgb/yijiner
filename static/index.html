<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>一进二</title>
<script>
var echartsReady=false;
(function loadJS(i){
  var c=['https://lib.baomitu.com/echarts/5.5.0/echarts.min.js','https://cdn.bootcdn.net/ajax/libs/echarts/5.5.0/echarts.min.js'];
  if(i>=c.length)return;
  var s=document.createElement('script');s.src=c[i];
  s.onload=function(){echartsReady=true};
  s.onerror=function(){loadJS(i+1)};
  document.head.appendChild(s);
})(0);
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC',sans-serif;background:#0d1117;color:#c8cdd3;font-size:13px;max-width:800px;margin:auto}
.bar{display:flex;gap:8px;padding:8px 10px;background:#010409;border-bottom:1px solid #30363d;flex-wrap:wrap;align-items:center;font-size:11px;position:sticky;top:0;z-index:10}
.bar .up{color:#3fb950}.bar .dn{color:#f85149}.bar .state{padding:2px 6px;border-radius:8px;font-size:10px;font-weight:bold}
.state.g{background:#3fb95022;color:#3fb950}.state.y{background:#f0c06022;color:#f0c060}.state.r{background:#f8514922;color:#f85149}
.tabs{display:flex;border-bottom:1px solid #30363d}
.tabs button{flex:1;padding:10px;background:0;color:#8b949e;border:0;border-bottom:2px solid transparent;cursor:pointer;font-size:13px}
.tabs button.on{color:#f0c060;border-bottom-color:#f0c060}
.content{padding:10px}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:10px;margin-bottom:8px}
.card .hd{display:flex;justify-content:space-between;margin-bottom:6px}
.card .code{font-size:14px;color:#58a6ff}.card .score{font-size:18px;color:#f0c060;font-weight:bold}
.card .info{font-size:11px;color:#8b949e;margin-bottom:4px}
.card .price{font-size:12px}
.card .price span{margin-right:10px}
.card .buy{color:#58a6ff}.card .tp{color:#3fb950}.card .sl{color:#f85149}
.btn{padding:6px 14px;border-radius:4px;border:1px solid #30363d;background:#161b22;color:#c8cdd3;cursor:pointer;font-size:13px}
.btn.go{background:#f0c060;color:#000;border-color:#f0c060;font-weight:bold}
.btn.sm{padding:4px 10px;font-size:11px}
.chart-box{border:1px solid #30363d;border-radius:8px;margin:10px 0;padding:5px}
.chart-box .periods{margin-bottom:5px}
.chart-box .periods button{padding:3px 10px;border-radius:3px;border:1px solid #30363d;background:#161b22;color:#8b949e;font-size:10px;cursor:pointer;margin-right:3px}
.chart-box .periods button.on{background:#58a6ff;color:#fff}
.chart-box .chart{width:100%;height:350px}
.stats{display:flex;gap:10px;font-size:11px;color:#8b949e;padding:5px 0;flex-wrap:wrap}
.stats b{color:#c8cdd3}
.advice{font-size:12px;padding:8px;background:#1a294022;border-radius:4px;line-height:1.6}
.ld{text-align:center;padding:20px;color:#8b949e}.ld:after{content:'...'}
.h{color:#8b949e;font-size:11px;margin-bottom:5px}
input{padding:6px;background:#0d1117;border:1px solid #30363d;border-radius:4px;color:#c8cdd3;font-size:12px;margin:2px}
</style>
</head>
<body>

<div class="bar" id="topbar">加载中...</div>

<div class="tabs">
  <button class="on" onclick="switchTab(0)">一进二</button>
  <button onclick="switchTab(1)">双峰抄底</button>
  <button onclick="switchTab(2)">自选</button>
  <button onclick="switchTab(3)">持仓</button>
</div>

<div class="content" id="main">加载中...</div>

<script>
var tab=0, selCode='', selName='', chartInst=null, period=60;

async function api(p){try{var r=await fetch(p);return r.json()}catch(e){return{err:1}}}

function switchTab(n){tab=n;document.querySelectorAll('.tabs button').forEach(function(b,i){b.classList.toggle('on',i===n)});main()}

function main(){
  if(tab===0) loadPool('yijiner');
  else if(tab===1) loadPool('double_peak');
  else if(tab===2) loadWL();
  else loadHoldings();
}

// 顶栏
async function topbar(){
  var d=await api('/api/market');
  var el=document.getElementById('topbar');
  if(d.err){el.innerHTML='连接失败 <button class=btn onclick=topbar()>重试</button>';return}
  var sh=d.sh||{},sz=d.sz||{},c=d.state_color||'y';
  el.innerHTML='<span class="'+(sh.pct>=0?'up':'dn')+'">上证'+sh.price+' '+(sh.pct>=0?'+':'')+sh.pct+'%</span>'+
    '<span class="'+(sz.pct>=0?'up':'dn')+'">深证'+sz.price+' '+(sz.pct>=0?'+':'')+sz.pct+'%</span>'+
    '<span>涨停<b>'+d.total_zt+'</b> 炸板'+d.break_rate+'% 溢价'+(d.prev_premium>=0?'+':'')+d.prev_premium+'%</span>'+
    '<span class="state '+c+'">'+d.state+'</span>'+
    ' <button class="btn sm" onclick="topbar();main()">刷新</button> '+d.time;
}

// 股票池
async function loadPool(type){
  document.getElementById('main').innerHTML='<div class=ld>加载中</div>';
  var d=await api('/api/pool?strategy='+type);
  if(d.err||!d.rows||d.rows.length===0){document.getElementById('main').innerHTML='<div class=h>暂无数据 <button class=btn onclick="loadPool(\''+type+'\')">重试</button></div>';return}

  var h='<div class=h>'+d.strategy+' ('+d.count+'只) '+d.time+'</div>';
  d.rows.forEach(function(r,i){
    var p=r.price||0,bp=r.buy_price||p,sp=r.sell_price||r.target_price||0,sl=r.stop_price||0;
    h+='<div class=card onclick="showChart(\''+r.code+'\',\''+(r.name||'')+'\')" style="cursor:pointer">'+
      '<div class=hd><div><span class=code>'+r.code+'</span> '+(r.name||'')+'</div><div class=score>'+(r.score||0).toFixed(0)+'</div></div>'+
      '<div class=info>'+(r.seal?'封板'+r.seal+' ':'')+(r.board?r.board+'板 ':'')+(r.turnover?'换手'+r.turnover+'% ':'')+(r.reason||'')+'</div>'+
      '<div class=price><span class=buy>买'+bp.toFixed(2)+'</span><span class=tp>卖'+sp.toFixed(2)+'</span><span class=sl>损'+sl.toFixed(2)+'</span></div>'+
      '</div>';
  });
  h+='<div id=chartArea></div>';
  document.getElementById('main').innerHTML=h;
}

// K线图
async function showChart(code,name){
  selCode=code;selName=name;
  var area=document.getElementById('chartArea');
  area.innerHTML='<div class=chart-box><div class=periods id=prds></div><div class=chart id=ch></div><div class=stats id=st></div><div class=advice id=adv></div></div>';

  if(!echartsReady){area.innerHTML='<div class=ld>图表组件加载中，请稍后重试</div>';return}
  await loadChart(code,60);
  loadAdvice(code);
}

async function loadChart(code,days){
  period=days;
  document.getElementById('prds').innerHTML=[1,5,30,60,120,250].map(function(d){return '<button class="'+(days===d?'on':'')+'" onclick="loadChart(\''+code+'\','+d+')">'+(d===250?'年':d+'日')+'</button>'}).join('');

  var d=await api('/api/chart/'+code+'?days='+days);
  var container=document.getElementById('ch');
  if(!container||d.err||!d.ohlc){return}

  if(chartInst)chartInst.dispose();
  chartInst=echarts.init(container);

  var ohlc=d.ohlc,dates=d.dates,vols=d.volumes;
  var up=function(i){return ohlc[i]&&ohlc[i][1]>=ohlc[i][0]};
  var candle=ohlc.map(function(o,i){return[o[0],o[3],o[2],o[1]]});

  chartInst.setOption({
    grid:[{left:50,right:10,top:10,height:'58%'},{left:50,right:10,top:'74%',height:'18%'}],
    xAxis:[{data:dates,axisLabel:{fontSize:8,color:'#8b949e'}},{data:dates,axisLabel:{show:false}}],
    yAxis:[{scale:true,axisLabel:{fontSize:8,color:'#8b949e'},splitLine:{lineStyle:{color:'#21262d'}}},{axisLabel:{fontSize:8,color:'#8b949e'},splitLine:{show:false}}],
    series:[
      {type:'candlestick',data:candle,itemStyle:{color:'#f85149',color0:'#3fb950',borderColor:'#f85149',borderColor0:'#3fb950'},xAxisIndex:0,yAxisIndex:0},
      {type:'line',data:d.ma5||[],smooth:!0,connectNulls:!0,lineStyle:{width:1,color:'#fff'},symbol:'none',xAxisIndex:0,yAxisIndex:0},
      {type:'line',data:d.ma10||[],smooth:!0,connectNulls:!0,lineStyle:{width:1,color:'#f0c060'},symbol:'none',xAxisIndex:0,yAxisIndex:0},
      {type:'line',data:d.ma20||[],smooth:!0,connectNulls:!0,lineStyle:{width:1,color:'#da70d6'},symbol:'none',xAxisIndex:0,yAxisIndex:0},
      {type:'line',data:d.ma60||[],smooth:!0,connectNulls:!0,lineStyle:{width:1,color:'#3fb950'},symbol:'none',xAxisIndex:0,yAxisIndex:0},
      {type:'bar',data:vols,itemStyle:{color:function(p){return up(p.dataIndex)?'#3fb95044':'#f8514944'},borderColor:function(p){return up(p.dataIndex)?'#3fb950':'#f85149'},borderWidth:1},xAxisIndex:1,yAxisIndex:1}
    ],tooltip:{trigger:'axis'}
  });

  var st=d.stats||{};
  document.getElementById('st').innerHTML='区间'+st.days+'天 | 最高<b style=color:#f85149>'+st.period_high+'</b> | 最低<b style=color:#3fb950>'+st.period_low+'</b> | 均价<b>'+st.period_avg+'</b> | 最新<b>'+d.latest_price+'</b>';
}

async function loadAdvice(code){
  var d=await api('/api/stock/'+code);
  if(d.err)return;
  var adv=d.advice||{},ff=d.fund_flow||{};
  document.getElementById('adv').innerHTML='<b>'+d.trend+'势</b> | 60日位'+d.position_60+'% | 主力'+(ff.main_net?(ff.main_net/10000).toFixed(1)+'万':'-')+' | 策略:'+(d.strategies||[]).join('/')+'<br><b style=color:#f0c060>'+adv.action+'</b> 买<b style=color:#58a6ff>'+adv.buy_price+'</b> 卖<b style=color:#3fb950>'+adv.sell_price+'</b> 止损<b style=color:#f85149>'+adv.stop_price+'</b>';
}

// 自选
async function loadWL(){
  var wl=await api('/api/watchlist');
  var h='<div style="margin-bottom:10px"><input id=wl-code placeholder=代码><input id=wl-name placeholder=名称><button class=btn onclick=addWL()>+添加</button> <button class="btn go" onclick=analyzeWL()>分析全部</button></div>';
  var st=wl.stocks||[];
  if(st.length===0)h+='<div class=h>暂无自选</div>';
  else st.forEach(function(s){h+='<div class=card><span class=code onclick="showChart(\''+s.code+'\',\''+(s.name||'')+'\')">'+s.code+'</span> '+s.name+' <button class="btn sm" style=float:right onclick="removeWL(\''+s.code+'\');event.stopPropagation()">删</button></div>'});
  h+='<div id=wl-result></div>';
  document.getElementById('main').innerHTML=h;
}
async function addWL(){var c=document.getElementById('wl-code').value,n=document.getElementById('wl-name').value;await fetch('/api/watchlist/add?code='+c+'&name='+n,{method:'POST'});loadWL()}
async function removeWL(c){await fetch('/api/watchlist/remove?code='+c,{method:'POST'});loadWL()}
async function analyzeWL(){document.getElementById('wl-result').innerHTML='<div class=ld>分析中</div>';var d=await api('/api/analyze/watchlist');if(d.results){var h='';d.results.forEach(function(r){var a=r.advice||{};h+='<div class=card><b>'+r.code+'</b> '+r.trend+' | '+a.action+' | 买'+a.buy_price+' 卖'+a.sell_price+'</div>'});document.getElementById('wl-result').innerHTML=h}}

// 持仓
async function loadHoldings(){
  var hd=await api('/api/holdings');
  var h='<div style="margin-bottom:10px"><input id=hl-code placeholder=代码><input id=hl-price placeholder=买入价><input id=hl-qty placeholder=数量><button class=btn onclick=addHolding()>+买入</button> <button class="btn go" onclick=analyzeHoldings()>分析持仓</button></div>';
  var s=await api('/api/stats');
  h+='<div class=card>总盈亏<b style=color:'+((hd.total_return||0)>=0?'#3fb950':'#f85149')+'>'+(hd.total_return||0).toFixed(1)+'%</b> | 胜率'+s.win_rate+'% | 交易'+s.total_trades+'笔</div>';
  var pos=hd.positions||[];
  if(pos.length===0)h+='<div class=h>暂无持仓</div>';
  else pos.forEach(function(p){h+='<div class=card onclick="showChart(\''+p.code+'\',\''+(p.name||'')+'\')"><b>'+p.code+'</b> '+p.name+' | 成本'+p.buy_price+' 现价'+(p.current_price||p.buy_price).toFixed(2)+' <span style=color:'+((p.pnl||0)>=0?'#3fb950':'#f85149')+'>'+(p.pnl_pct||0).toFixed(1)+'%</span> <button class="btn sm" style=float:right onclick="event.stopPropagation();sellHolding(\''+p.code+'\')">卖出</button></div>'});
  h+='<div id=hd-result></div>';
  document.getElementById('main').innerHTML=h;
}
async function addHolding(){var c=document.getElementById('hl-code').value,p=parseFloat(document.getElementById('hl-price').value),q=parseInt(document.getElementById('hl-qty').value);await fetch('/api/holdings/add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:c,price:p,quantity:q,name:''})});loadHoldings()}
async function sellHolding(c){await fetch('/api/holdings/sell?code='+c,{method:'POST'});loadHoldings()}
async function analyzeHoldings(){document.getElementById('hd-result').innerHTML='<div class=ld>分析中</div>';var d=await api('/api/analyze/holdings');if(d.results){var h='';d.results.forEach(function(r){var a=r.advice||{};h+='<div class=card><b>'+r.code+'</b> '+r.trend+' | <b style=color:#f0c060>'+a.action+'</b> | 买'+a.buy_price+' 卖'+a.sell_price+' 止损'+a.stop_price+'</div>'});document.getElementById('hd-result').innerHTML=h}}

// 启动
topbar();main();
setInterval(topbar,60000);
</script>
</body>
</html>
